<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoDev Mail</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Mail App Layout ── */
    body { display:block; padding:0; background:#0d0f14; overflow:hidden; height:100vh; }

    .mail-app { display:flex; height:100vh; overflow:hidden; }

    /* Sidebar */
    .mail-sidebar {
      width:220px; flex-shrink:0;
      background:#161b25; border-right:1px solid #2a3347;
      display:flex; flex-direction:column; padding:20px 12px;
      gap:0;
    }
    .mail-brand { display:flex; align-items:center; gap:8px; padding:0 8px; margin-bottom:18px; }
    .mail-brand-icon { width:32px;height:32px;background:#4f8ef7;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 16px rgba(79,142,247,.3); }
    .mail-brand-name { font-size:16px;font-weight:700;letter-spacing:-.3px; }
    .mail-brand-name span { color:#4f8ef7; }

    .compose-btn {
      display:flex; align-items:center; gap:8px;
      background:#4f8ef7; color:#fff; border:none;
      padding:11px 16px; border-radius:10px;
      font-size:14px; font-weight:600; font-family:inherit;
      cursor:pointer; margin-bottom:20px;
      transition:background .2s; box-shadow:0 4px 16px rgba(79,142,247,.3);
    }
    .compose-btn:hover { background:#3a78e8; }

    .mail-nav { display:flex; flex-direction:column; gap:2px; flex:1; }
    .mail-nav-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 12px; border-radius:8px;
      font-size:14px; font-weight:500; color:#7a8aa0;
      cursor:pointer; transition:background .15s,color .15s;
      user-select:none;
    }
    .mail-nav-item:hover { background:#1e2535; color:#e8edf5; }
    .mail-nav-item.active { background:rgba(79,142,247,.12); color:#4f8ef7; }
    .mail-nav-left { display:flex; align-items:center; gap:10px; }
    .nav-icon { font-size:15px; }
    .unread-badge {
      background:#4f8ef7; color:#fff;
      font-size:11px; font-weight:700;
      padding:2px 7px; border-radius:10px;
      min-width:20px; text-align:center;
      display:none;
    }
    .unread-badge.show { display:inline-block; }

    .sidebar-divider { border:none; border-top:1px solid #2a3347; margin:12px 0; }

    .mail-user {
      display:flex; align-items:center; gap:10px;
      padding:10px 8px; border-radius:8px;
      background:#1e2535; border:1px solid #2a3347;
    }
    .mail-avatar-sm {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,#4f8ef7,#7c3aed);
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:700; flex-shrink:0;
    }
    .mail-user-info { flex:1; min-width:0; }
    .mail-user-email { font-size:11px; color:#7a8aa0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mail-user-role  { font-size:10px; color:#4f8ef7; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
    .mail-logout-btn {
      background:none; border:none; cursor:pointer;
      color:#7a8aa0; font-size:16px; padding:2px 4px;
      transition:color .15s;
    }
    .mail-logout-btn:hover { color:#f87171; }

    /* Message List Panel */
    .mail-list-panel {
      width:300px; flex-shrink:0;
      border-right:1px solid #2a3347;
      display:flex; flex-direction:column;
      overflow:hidden;
    }
    .mail-list-header {
      padding:16px 20px 12px;
      border-bottom:1px solid #2a3347;
      display:flex; align-items:center; justify-content:space-between;
    }
    .mail-list-title { font-size:16px; font-weight:700; letter-spacing:-.2px; }
    .mail-list-count { font-size:12px; color:#7a8aa0; }

    .mail-list-body { flex:1; overflow-y:auto; }
    .mail-list-body::-webkit-scrollbar { width:4px; }
    .mail-list-body::-webkit-scrollbar-track { background:transparent; }
    .mail-list-body::-webkit-scrollbar-thumb { background:#2a3347; border-radius:2px; }

    .msg-item {
      padding:14px 16px; border-bottom:1px solid rgba(42,51,71,.5);
      cursor:pointer; transition:background .12s;
      display:flex; gap:12px; align-items:flex-start;
    }
    .msg-item:hover { background:#1e2535; }
    .msg-item.selected { background:rgba(79,142,247,.08); border-left:2px solid #4f8ef7; }
    .msg-item.unread .msg-sender, .msg-item.unread .msg-subject { color:#e8edf5; font-weight:600; }
    .msg-item.unread { background:rgba(79,142,247,.04); }

    .msg-avatar {
      width:36px; height:36px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:700; color:#fff;
    }
    .msg-meta { flex:1; min-width:0; }
    .msg-row1 { display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:3px; }
    .msg-sender { font-size:13px; font-weight:500; color:#b0bec5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .msg-time   { font-size:11px; color:#7a8aa0; white-space:nowrap; flex-shrink:0; }
    .msg-subject { font-size:13px; color:#7a8aa0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
    .msg-preview { font-size:12px; color:#4a5568; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .mail-empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100%; color:#7a8aa0; gap:8px; padding:40px;
      text-align:center;
    }
    .mail-empty-icon { font-size:40px; opacity:.4; }
    .mail-empty-text { font-size:14px; }

    /* Message Content Area */
    .mail-content { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .mail-content::-webkit-scrollbar { width:4px; }
    .mail-content::-webkit-scrollbar-thumb { background:#2a3347; border-radius:2px; }

    .msg-view { padding:32px 40px; max-width:820px; }

    .msg-view-subject { font-size:22px; font-weight:700; letter-spacing:-.3px; margin-bottom:20px; line-height:1.3; }

    .msg-view-meta {
      display:flex; align-items:flex-start; gap:14px;
      padding:16px 0; border-top:1px solid #2a3347; border-bottom:1px solid #2a3347;
      margin-bottom:28px;
    }
    .msg-view-avatar {
      width:40px; height:40px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:700; color:#fff;
    }
    .msg-view-from-name { font-size:14px; font-weight:600; margin-bottom:2px; }
    .msg-view-from-email { font-size:12px; color:#7a8aa0; }
    .msg-view-to   { font-size:12px; color:#7a8aa0; margin-top:2px; }
    .msg-view-date { font-size:12px; color:#7a8aa0; margin-left:auto; white-space:nowrap; }

    .msg-view-body {
      font-size:15px; line-height:1.75; color:#c8d6e5;
      white-space:pre-wrap; word-break:break-word;
    }

    .msg-actions { display:flex; gap:10px; margin-top:28px; padding-top:20px; border-top:1px solid #2a3347; }
    .msg-action-btn {
      display:flex; align-items:center; gap:6px;
      padding:9px 18px; border-radius:8px;
      font-size:13px; font-weight:600; font-family:inherit;
      cursor:pointer; transition:background .15s;
    }
    .btn-reply  { background:rgba(79,142,247,.12); color:#4f8ef7; border:1px solid rgba(79,142,247,.25); }
    .btn-reply:hover { background:rgba(79,142,247,.2); }
    .btn-trash  { background:rgba(248,113,113,.1); color:#f87171; border:1px solid rgba(248,113,113,.2); }
    .btn-trash:hover { background:rgba(248,113,113,.2); }
    .btn-delete { background:rgba(248,113,113,.1); color:#f87171; border:1px solid rgba(248,113,113,.2); }
    .btn-delete:hover { background:rgba(248,113,113,.2); }

    .no-msg-selected {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      color:#7a8aa0; gap:12px;
    }
    .no-msg-icon { font-size:56px; opacity:.25; }
    .no-msg-text { font-size:15px; }

    /* Compose Overlay */
    .compose-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.5);
      display:flex; align-items:center; justify-content:center;
      z-index:100; backdrop-filter:blur(4px);
    }
    .compose-card {
      width:560px; max-width:95vw;
      background:#161b25; border:1px solid #2a3347;
      border-radius:14px; overflow:hidden;
      box-shadow:0 24px 64px rgba(0,0,0,.6);
    }
    .compose-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px; border-bottom:1px solid #2a3347;
      font-size:15px; font-weight:600;
    }
    .compose-close { background:none; border:none; color:#7a8aa0; font-size:20px; cursor:pointer; line-height:1; padding:2px 6px; border-radius:4px; }
    .compose-close:hover { background:#2a3347; color:#e8edf5; }

    .compose-field {
      display:flex; align-items:center;
      border-bottom:1px solid #2a3347; padding:0 20px;
    }
    .compose-label { font-size:12px; color:#7a8aa0; width:52px; flex-shrink:0; font-weight:500; }
    .compose-input {
      flex:1; background:none; border:none; color:#e8edf5;
      font-size:14px; font-family:inherit; padding:13px 0;
      outline:none;
    }
    .compose-input::placeholder { color:#4a5568; }

    .compose-body-area {
      padding:16px 20px; min-height:200px;
    }
    .compose-textarea {
      width:100%; background:none; border:none; color:#e8edf5;
      font-size:14px; font-family:inherit; resize:none;
      outline:none; min-height:180px; line-height:1.6;
    }
    .compose-textarea::placeholder { color:#4a5568; }

    .compose-footer {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 20px; border-top:1px solid #2a3347;
    }
    .compose-send-btn {
      background:#4f8ef7; color:#fff; border:none;
      padding:10px 24px; border-radius:8px;
      font-size:14px; font-weight:600; font-family:inherit;
      cursor:pointer; transition:background .2s;
    }
    .compose-send-btn:hover { background:#3a78e8; }
    .compose-send-btn:disabled { opacity:.5; cursor:not-allowed; }
    .compose-discard-btn {
      background:none; border:1px solid #2a3347; color:#7a8aa0;
      padding:9px 16px; border-radius:8px;
      font-size:13px; font-family:inherit; cursor:pointer;
      transition:border-color .15s,color .15s;
    }
    .compose-discard-btn:hover { border-color:#f87171; color:#f87171; }
    .compose-status { font-size:13px; }
    .compose-status.ok   { color:#34d399; }
    .compose-status.err  { color:#f87171; }

    @media (max-width:768px) {
      .mail-sidebar { width:56px; padding:12px 8px; }
      .mail-brand-name, .mail-nav-item span, .mail-user-info,
      .compose-btn span, .mail-user-role, .sidebar-divider-label { display:none; }
      .mail-list-panel { width:260px; }
      .msg-view { padding:20px; }
    }
  </style>
</head>
<body>
<div class="mail-app">

  <!-- ── Sidebar ── -->
  <aside class="mail-sidebar">
    <div class="mail-brand">
      <div class="mail-brand-icon">✉</div>
      <div class="mail-brand-name">Go<span>Dev</span></div>
    </div>

    <button class="compose-btn" id="compose-btn">
      <span>✏</span> <span>Compose</span>
    </button>

    <nav class="mail-nav">
      <div class="mail-nav-item active" data-folder="inbox">
        <div class="mail-nav-left"><span class="nav-icon">📥</span> <span>Inbox</span></div>
        <span class="unread-badge" id="inbox-badge"></span>
      </div>
      <div class="mail-nav-item" data-folder="sent">
        <div class="mail-nav-left"><span class="nav-icon">📤</span> <span>Sent</span></div>
      </div>
      <div class="mail-nav-item" data-folder="trash">
        <div class="mail-nav-left"><span class="nav-icon">🗑</span> <span>Trash</span></div>
      </div>
    </nav>

    <hr class="sidebar-divider" />

    <div class="mail-user">
      <div class="mail-avatar-sm" id="sidebar-avatar">?</div>
      <div class="mail-user-info">
        <div class="mail-user-email" id="sidebar-email">Loading…</div>
        <div class="mail-user-role"  id="sidebar-role"></div>
      </div>
      <button class="mail-logout-btn" id="logout-btn" title="Sign out">↩</button>
    </div>
  </aside>

  <!-- ── Message List ── -->
  <div class="mail-list-panel">
    <div class="mail-list-header">
      <span class="mail-list-title" id="folder-title">Inbox</span>
      <span class="mail-list-count" id="msg-count"></span>
    </div>
    <div class="mail-list-body" id="mail-list-body">
      <div class="mail-empty"><div class="mail-empty-icon">📭</div><div class="mail-empty-text">Loading…</div></div>
    </div>
  </div>

  <!-- ── Message Content ── -->
  <div class="mail-content" id="mail-content">
    <div class="no-msg-selected">
      <div class="no-msg-icon">✉</div>
      <div class="no-msg-text">Select a message to read</div>
    </div>
  </div>
</div>

<!-- ── Compose Modal ── -->
<div class="compose-overlay" id="compose-overlay" style="display:none">
  <div class="compose-card">
    <div class="compose-header">
      <span>New Message</span>
      <button class="compose-close" id="compose-close">✕</button>
    </div>
    <div class="compose-field">
      <span class="compose-label">To</span>
      <input class="compose-input" id="compose-to" placeholder="user@godev.com" type="email" />
    </div>
    <div class="compose-field">
      <span class="compose-label">Subject</span>
      <input class="compose-input" id="compose-subject" placeholder="Subject" type="text" />
    </div>
    <div class="compose-body-area">
      <textarea class="compose-textarea" id="compose-body" placeholder="Write your message…"></textarea>
    </div>
    <div class="compose-footer">
      <button class="compose-send-btn" id="compose-send">Send ✈</button>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="compose-status" id="compose-status"></span>
        <button class="compose-discard-btn" id="compose-discard">Discard</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Auth token ────────────────────────────────────────────────────────────────
const TOKEN = localStorage.getItem('godev_token');
if (!TOKEN) window.location.href = '/login';

function authHeaders(extra) {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}`, ...(extra||{}) };
}

// ── State ─────────────────────────────────────────────────────────────────────
let me = null;
let currentFolder = 'inbox';
let messages = [];
let selectedId = null;

// ── Avatar color from string ──────────────────────────────────────────────────
const COLORS = ['#4f8ef7','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#7c3aed'];
function avatarColor(str) { let h=0; for(let c of str) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initial(email) { return (email||'?')[0].toUpperCase(); }

// ── Time formatting ───────────────────────────────────────────────────────────
function formatTime(dateStr) {
  const d = new Date(dateStr), now = new Date();
  const diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate())
    return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  if (diff < 7 * 86400000)
    return d.toLocaleDateString('en-US',{weekday:'short'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function formatFull(dateStr) {
  return new Date(dateStr).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: authHeaders() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (r.status === 401) { localStorage.removeItem('godev_token'); window.location.href='/login'; }
  return r;
}

// ── Load current user ─────────────────────────────────────────────────────────
async function loadMe() {
  const r = await fetch('/api/me', { headers: authHeaders() });
  if (r.status === 401) { localStorage.removeItem('godev_token'); window.location.href='/login'; return; }
  me = await r.json();
  document.getElementById('sidebar-avatar').textContent = initial(me.email);
  document.getElementById('sidebar-avatar').style.background = `linear-gradient(135deg, ${avatarColor(me.email)}, #7c3aed)`;
  document.getElementById('sidebar-email').textContent = me.email;
  document.getElementById('sidebar-role').textContent  = me.role === 'admin' ? '★ Admin' : '';
  document.title = `GoDev Mail — ${me.email}`;
  loadUnreadCount();
}

// ── Unread badge ──────────────────────────────────────────────────────────────
async function loadUnreadCount() {
  try {
    const r = await fetch('/api/mail/unread-count', { headers: authHeaders() });
    const d = await r.json();
    const badge = document.getElementById('inbox-badge');
    if (d.count > 0) { badge.textContent = d.count; badge.classList.add('show'); }
    else badge.classList.remove('show');
  } catch {}
}

// ── Load folder ───────────────────────────────────────────────────────────────
async function loadFolder(folder) {
  currentFolder = folder;
  selectedId = null;

  // Update nav active state
  document.querySelectorAll('.mail-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.folder === folder);
  });

  const titles = { inbox:'Inbox', sent:'Sent', trash:'Trash' };
  document.getElementById('folder-title').textContent = titles[folder];

  document.getElementById('mail-list-body').innerHTML =
    '<div class="mail-empty"><div class="mail-empty-icon">⏳</div><div class="mail-empty-text">Loading…</div></div>';
  document.getElementById('mail-content').innerHTML =
    '<div class="no-msg-selected"><div class="no-msg-icon">✉</div><div class="no-msg-text">Select a message to read</div></div>';

  try {
    const r = await fetch(`/api/mail/${folder}`, { headers: authHeaders() });
    if (r.status === 401) { localStorage.removeItem('godev_token'); window.location.href='/login'; return; }
    const d = await r.json();
    messages = d.messages || [];
    renderList();
  } catch {
    document.getElementById('mail-list-body').innerHTML =
      '<div class="mail-empty"><div class="mail-empty-text" style="color:#f87171">Failed to load.</div></div>';
  }
}

// ── Render message list ───────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('mail-list-body');
  document.getElementById('msg-count').textContent = messages.length ? `${messages.length}` : '';

  if (!messages.length) {
    const labels = { inbox:'Your inbox is empty', sent:'No sent messages', trash:'Trash is empty' };
    container.innerHTML = `<div class="mail-empty"><div class="mail-empty-icon">📭</div><div class="mail-empty-text">${labels[currentFolder]||'No messages'}</div></div>`;
    return;
  }

  container.innerHTML = messages.map(m => {
    const displayAddr = currentFolder === 'sent' ? m.to : m.from;
    const displayName = displayAddr.split('@')[0];
    const isUnread = currentFolder === 'inbox' && !m.read;
    const preview  = m.body.replace(/\n/g,' ').slice(0,80);
    return `
      <div class="msg-item ${isUnread?'unread':''} ${m._id===selectedId?'selected':''}"
           data-id="${m._id}" onclick="openMessage('${m._id}')">
        <div class="msg-avatar" style="background:${avatarColor(displayAddr)}">${initial(displayAddr)}</div>
        <div class="msg-meta">
          <div class="msg-row1">
            <span class="msg-sender">${isUnread?'<strong>'+displayName+'</strong>':displayName}</span>
            <span class="msg-time">${formatTime(m.sentAt)}</span>
          </div>
          <div class="msg-subject">${escHtml(m.subject)}</div>
          <div class="msg-preview">${escHtml(preview)}</div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Open message ──────────────────────────────────────────────────────────────
async function openMessage(id) {
  selectedId = id;
  // Highlight selected
  document.querySelectorAll('.msg-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id);
  });

  document.getElementById('mail-content').innerHTML =
    '<div class="no-msg-selected"><div class="mail-empty-icon">⏳</div></div>';

  try {
    const r = await fetch(`/api/mail/message/${id}`, { headers: authHeaders() });
    if (!r.ok) return;
    const { message:msg } = await r.json();

    // Mark as read in local state
    const localMsg = messages.find(m => m._id === id);
    if (localMsg) { localMsg.read = true; renderList(); document.querySelector(`[data-id="${id}"]`)?.classList.add('selected'); }
    loadUnreadCount();

    const fromName = msg.from.split('@')[0];
    const isInbox  = currentFolder === 'inbox';
    const isTrash  = currentFolder === 'trash';

    const trashOrDelete = isTrash
      ? `<button class="msg-action-btn btn-delete" onclick="permDelete('${msg._id}')">🗑 Delete Forever</button>`
      : `<button class="msg-action-btn btn-trash" onclick="trashMessage('${msg._id}')">🗑 Move to Trash</button>`;

    const replyBtn = isInbox
      ? `<button class="msg-action-btn btn-reply" onclick="openReply('${escHtml(msg.from)}','${escHtml(msg.subject)}')">↩ Reply</button>`
      : '';

    document.getElementById('mail-content').innerHTML = `
      <div class="msg-view">
        <div class="msg-view-subject">${escHtml(msg.subject)}</div>
        <div class="msg-view-meta">
          <div class="msg-view-avatar" style="background:${avatarColor(msg.from)}">${initial(msg.from)}</div>
          <div>
            <div class="msg-view-from-name">${escHtml(fromName)}</div>
            <div class="msg-view-from-email">${escHtml(msg.from)}</div>
            <div class="msg-view-to">To: ${escHtml(msg.to)}</div>
          </div>
          <div class="msg-view-date">${formatFull(msg.sentAt)}</div>
        </div>
        <div class="msg-view-body">${escHtml(msg.body)}</div>
        <div class="msg-actions">
          ${replyBtn}
          ${trashOrDelete}
        </div>
      </div>`;
  } catch {}
}

// ── Trash / Delete ────────────────────────────────────────────────────────────
async function trashMessage(id) {
  await api('DELETE', `/api/mail/message/${id}`);
  messages = messages.filter(m => m._id !== id);
  document.getElementById('mail-content').innerHTML =
    '<div class="no-msg-selected"><div class="no-msg-icon">✉</div><div class="no-msg-text">Select a message to read</div></div>';
  renderList();
  loadUnreadCount();
}

async function permDelete(id) {
  if (!confirm('Permanently delete this message?')) return;
  await api('DELETE', `/api/mail/message/${id}/permanent`);
  messages = messages.filter(m => m._id !== id);
  document.getElementById('mail-content').innerHTML =
    '<div class="no-msg-selected"><div class="no-msg-icon">✉</div><div class="no-msg-text">Select a message to read</div></div>';
  renderList();
}

// ── Compose ───────────────────────────────────────────────────────────────────
function openCompose(to='', subject='', body='') {
  document.getElementById('compose-to').value      = to;
  document.getElementById('compose-subject').value = subject;
  document.getElementById('compose-body').value    = body;
  document.getElementById('compose-status').textContent = '';
  document.getElementById('compose-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById(to ? 'compose-subject':'compose-to').focus(), 50);
}
function openReply(from, subject) {
  const subj = subject.startsWith('Re:') ? subject : `Re: ${subject}`;
  openCompose(from, subj, '\n\n─────────────────────\n');
}
function closeCompose() {
  document.getElementById('compose-overlay').style.display = 'none';
}

document.getElementById('compose-btn').addEventListener('click', () => openCompose());
document.getElementById('compose-close').addEventListener('click', closeCompose);
document.getElementById('compose-discard').addEventListener('click', closeCompose);
document.getElementById('compose-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('compose-overlay')) closeCompose();
});

document.getElementById('compose-send').addEventListener('click', async () => {
  const to      = document.getElementById('compose-to').value.trim();
  const subject = document.getElementById('compose-subject').value.trim();
  const body    = document.getElementById('compose-body').value.trim();
  const status  = document.getElementById('compose-status');
  const btn     = document.getElementById('compose-send');

  if (!to) { status.textContent='Please enter a recipient.'; status.className='compose-status err'; return; }
  if (!body && !subject) { status.textContent='Message is empty.'; status.className='compose-status err'; return; }

  btn.disabled = true; btn.textContent = 'Sending…';
  status.textContent = ''; status.className = 'compose-status';

  const r = await api('POST','/api/mail/compose',{ to, subject, body });
  const d = await r.json();
  btn.disabled = false; btn.textContent = 'Send ✈';

  if (!r.ok) { status.textContent = d.error||'Failed to send.'; status.className='compose-status err'; return; }

  status.textContent = '✓ Sent!'; status.className = 'compose-status ok';
  setTimeout(closeCompose, 800);
  if (currentFolder === 'sent') loadFolder('sent');
});

// ── Nav clicks ────────────────────────────────────────────────────────────────
document.querySelectorAll('.mail-nav-item').forEach(el => {
  el.addEventListener('click', () => loadFolder(el.dataset.folder));
});

// ── Logout ────────────────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('godev_token');
  localStorage.removeItem('godev_email');
  localStorage.removeItem('godev_role');
  window.location.href = '/login';
});

// ── Admin panel link ──────────────────────────────────────────────────────────
// Shown dynamically if admin

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadMe();
  if (me?.role === 'admin') {
    // Add admin panel link
    const nav = document.querySelector('.mail-nav');
    const adminItem = document.createElement('div');
    adminItem.className = 'mail-nav-item';
    adminItem.innerHTML = '<div class="mail-nav-left"><span class="nav-icon">⚙</span> <span>Admin Panel</span></div>';
    adminItem.onclick = () => window.location.href = '/admin';
    nav.appendChild(adminItem);
  }
  await loadFolder('inbox');
})();
</script>
