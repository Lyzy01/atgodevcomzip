<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoDev Mail — Verify Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">✉</div>
      <div class="brand-name">Go<span>Dev</span> Mail</div>
    </div>

    <h1>Check your phone</h1>
    <p class="subtitle">We sent a 6-digit code to the phone linked to your account. It expires in 5 minutes.</p>

    <div class="phone-hint">
      ✉ <span id="email-display">your@godev.com</span>
    </div>

    <form id="verify-form" novalidate>
      <div class="form-group">
        <label for="otp">Verification Code</label>
        <input
          type="text"
          id="otp"
          class="otp-input"
          placeholder="000000"
          maxlength="6"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="one-time-code"
          required
        />
      </div>

      <button type="submit" id="submit-btn">Sign In</button>
    </form>

    <div class="alert" id="alert"></div>

    <div class="footer-link">
      Wrong email? <a href="/login">Go back →</a>
    </div>
  </div>

  <script>
    const otpInput = document.getElementById('otp');
    const submitBtn = document.getElementById('submit-btn');
    const alertEl = document.getElementById('alert');
    const email = sessionStorage.getItem('godev_login_email') || '';

    document.getElementById('email-display').textContent = email || 'your@godev.com';

    otpInput.addEventListener('input', () => {
      otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
    });

    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = `alert show alert-${type}`;
    }

    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.innerHTML = on ? '<span class="spinner"></span>Signing in…' : 'Sign In';
    }

    document.getElementById('verify-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.className = 'alert';

      const otp = otpInput.value.trim();
      if (!email) { showAlert('Session lost. Please start over.', 'error'); return; }
      if (otp.length !== 6) { showAlert('Please enter the full 6-digit code.', 'error'); return; }

      setLoading(true);
      try {
        const res = await fetch('/api/verify-login-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp }),
        });
        const data = await res.json();

        if (!res.ok) { showAlert(data.error || 'Verification failed.', 'error'); return; }

        sessionStorage.removeItem('godev_login_email');
        showAlert('Signed in! Redirecting…', 'success');
        setTimeout(() => {
          window.location.href = data.role === 'admin' ? '/admin' : '/dashboard';
        }, 900);
      } catch {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
