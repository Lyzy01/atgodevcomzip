<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoDev Mail — Create Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">✉</div>
      <div class="brand-name">Go<span>Dev</span> Mail</div>
    </div>

    <h1>Create your account</h1>
    <p class="subtitle">Pick a username and get your free <strong>@godev.com</strong> email address.</p>

    <form id="signup-form" novalidate autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-suffix-wrap">
          <input type="text" id="username" name="username" placeholder="yourname"
            autocomplete="off" spellcheck="false" maxlength="30" required />
          <span class="input-suffix">@godev.com</span>
        </div>
        <div class="field-hint" id="username-hint"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-eye-wrap">
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
          <button type="button" class="eye-btn" data-target="password">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <div class="input-eye-wrap">
          <input type="password" id="confirm" name="confirm" placeholder="Re-enter password" autocomplete="new-password" required />
          <button type="button" class="eye-btn" data-target="confirm">👁</button>
        </div>
        <div class="field-hint" id="confirm-hint"></div>
      </div>

      <button type="submit" id="submit-btn">Create Account</button>
    </form>

    <div class="alert" id="alert"></div>
    <div class="footer-link">Already have an account? <a href="/login">Sign in →</a></div>
  </div>

  <script>
    if (localStorage.getItem('godev_token')) window.location.href = '/mail';

    document.querySelectorAll('.eye-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.target);
        inp.type = inp.type === 'password' ? 'text' : 'password';
      });
    });

    const usernameInput = document.getElementById('username');
    const usernameHint  = document.getElementById('username-hint');
    const confirmInput  = document.getElementById('confirm');
    const confirmHint   = document.getElementById('confirm-hint');
    const alertEl       = document.getElementById('alert');
    let usernameAvailable = false, usernameTimer;

    usernameInput.addEventListener('input', () => {
      const val = usernameInput.value.trim().toLowerCase();
      usernameAvailable = false;
      if (!val) { usernameHint.textContent = ''; usernameHint.className = 'field-hint'; return; }
      if (!/^[a-z0-9._-]{3,30}$/.test(val)) {
        usernameHint.textContent = 'Only letters, numbers, dots, underscores, hyphens (3–30 chars).';
        usernameHint.className = 'field-hint hint-error'; return;
      }
      usernameHint.textContent = 'Checking…'; usernameHint.className = 'field-hint hint-muted';
      clearTimeout(usernameTimer);
      usernameTimer = setTimeout(async () => {
        try {
          const res = await fetch(`/api/check-username?username=${encodeURIComponent(val)}`);
          const data = await res.json();
          if (data.available) {
            usernameHint.textContent = `✓ ${val}@godev.com is available!`;
            usernameHint.className = 'field-hint hint-success'; usernameAvailable = true;
          } else {
            usernameHint.textContent = `✗ "${val}" is already taken.`;
            usernameHint.className = 'field-hint hint-error';
          }
        } catch { usernameHint.textContent = ''; }
      }, 500);
    });

    confirmInput.addEventListener('input', () => {
      const pw = document.getElementById('password').value;
      if (!confirmInput.value) { confirmHint.textContent = ''; confirmHint.className = 'field-hint'; return; }
      confirmHint.textContent = confirmInput.value === pw ? '✓ Passwords match' : '✗ Passwords do not match';
      confirmHint.className = `field-hint ${confirmInput.value === pw ? 'hint-success' : 'hint-error'}`;
    });

    function showAlert(msg, type) { alertEl.textContent = msg; alertEl.className = `alert show alert-${type}`; }
    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Creating account…' : 'Create Account';
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.className = 'alert';
      const username = usernameInput.value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (!username)            { showAlert('Please enter a username.', 'error'); return; }
      if (!usernameAvailable)   { showAlert('Please choose an available username.', 'error'); return; }
      if (password.length < 8)  { showAlert('Password must be at least 8 characters.', 'error'); return; }
      if (password !== confirm)  { showAlert('Passwords do not match.', 'error'); return; }

      setLoading(true);
      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error || 'Something went wrong.', 'error'); return; }

        localStorage.setItem('godev_token', data.token);
        localStorage.setItem('godev_email', data.email);
        localStorage.setItem('godev_role',  data.role);

        showAlert('🎉 Account created! Taking you to your inbox…', 'success');
        setTimeout(() => { window.location.href = '/mail'; }, 800);
      } catch {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
