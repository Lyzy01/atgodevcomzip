<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoDev Mail — Verify Phone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">✉</div>
      <div class="brand-name">Go<span>Dev</span> Mail</div>
    </div>

    <h1>Verify your phone</h1>
    <p class="subtitle">We sent a 6-digit code to your phone number. It expires in 5 minutes.</p>

    <form id="verify-form" novalidate>
      <div class="form-group">
        <label for="otp">Verification Code</label>
        <input
          type="text"
          id="otp"
          class="otp-input"
          placeholder="000000"
          maxlength="6"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="one-time-code"
          required
        />
      </div>

      <button type="submit" id="submit-btn">Verify &amp; Create Account</button>
    </form>

    <div class="alert" id="alert"></div>

    <div class="email-reveal" id="email-reveal">
      <div class="label">Your new GoDev email</div>
      <div class="address" id="email-address"></div>
    </div>

    <div class="footer-link">
      Wrong number? <a href="/">Start over →</a>
    </div>

    <div class="security-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      OTP is hashed with bcrypt · One-time use · Auto-deletes after 5 min
    </div>
  </div>

  <script>
    const otpInput  = document.getElementById('otp');
    const submitBtn = document.getElementById('submit-btn');
    const alertEl   = document.getElementById('alert');

    otpInput.addEventListener('input', () => {
      otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
    });

    function showAlert(msg, type) { alertEl.textContent = msg; alertEl.className = `alert show alert-${type}`; }
    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.innerHTML = on ? '<span class="spinner"></span>Verifying…' : 'Verify &amp; Create Account';
    }

    document.getElementById('verify-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.className = 'alert';

      const otp = otpInput.value.trim();
      if (otp.length !== 6) { showAlert('Please enter the full 6-digit code.', 'error'); return; }

      setLoading(true);
      try {
        const res = await fetch('/api/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ otp }),
        });
        const data = await res.json();

        if (!res.ok) { showAlert(data.error || 'Verification failed.', 'error'); return; }

        document.getElementById('verify-form').style.display = 'none';
        document.getElementById('email-address').textContent = data.email;
        document.getElementById('email-reveal').classList.add('show');
        showAlert('🎉 Account created! Redirecting to your dashboard…', 'success');
        setTimeout(() => { window.location.href = '/dashboard'; }, 2000);
      } catch {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
